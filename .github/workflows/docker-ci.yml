name: CI/CD Multi-App Pipeline

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Login to Docker Hub
      run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

    - name: Build Backend Image
      run: docker build -t ${{ secrets.DOCKER_USERNAME }}/multi-app:${{ github.run_number }} ./app

    - name: Push Image
      run: docker push ${{ secrets.DOCKER_USERNAME }}/multi-app:${{ github.run_number }}

    - name: Run Containers
      run: docker compose up -d --build
